<VirtualHost *:80>
    ServerName sklad.example.cz
    DocumentRoot /var/www/clients/client1/web1/web

    WSGIDaemonProcess sklad-fotokatalog python-home=/var/www/clients/client1/web1/venv python-path=/var/www/clients/client1/web1/web
    WSGIProcessGroup sklad-fotokatalog
    WSGIScriptAlias / /var/www/clients/client1/web1/web/wsgi.py

    Alias /static/ /var/www/clients/client1/web1/web/static/
    Alias /media/ /var/www/clients/client1/web1/web/media/

    <Directory /var/www/clients/client1/web1/web/static>
        Require all granted
    </Directory>

    <Directory /var/www/clients/client1/web1/web/media>
        Require all granted
    </Directory>

    <Directory /var/www/clients/client1/web1/web>
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/sklad-fotokatalog-error.log
    CustomLog ${APACHE_LOG_DIR}/sklad-fotokatalog-access.log combined
</VirtualHost>
