<VirtualHost *:80>
    ServerName example.com
    DocumentRoot /var/www/example.com/web

    WSGIDaemonProcess sklad-fotokatalog python-home=/var/www/example.com/venv python-path=/var/www/example.com/web
    WSGIProcessGroup sklad-fotokatalog
    WSGIScriptAlias / /var/www/example.com/web/wsgi.py

    Alias /static/ /var/www/example.com/web/static/
    Alias /media/ /var/www/example.com/web/media/

    <Directory /var/www/example.com/web/static>
        Require all granted
    </Directory>

    <Directory /var/www/example.com/web/media>
        Require all granted
    </Directory>

    <Directory /var/www/example.com/web>
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/sklad-fotokatalog-error.log
    CustomLog ${APACHE_LOG_DIR}/sklad-fotokatalog-access.log combined
</VirtualHost>
